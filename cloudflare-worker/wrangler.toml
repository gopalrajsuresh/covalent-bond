# Cloudflare Workers Configuration
# https://developers.cloudflare.com/workers/wrangler/configuration/

name = "covalent-bond-relay"
main = "worker.js"
compatibility_date = "2024-09-23"
workers_dev = true

# Session state lives in one Durable Object per routing ID: strongly
# consistent, single-threaded, alarm-expired. No KV namespaces needed.
[[durable_objects.bindings]]
name = "SESSION_DO"
class_name = "SessionDO"

[[migrations]]
tag = "v1-session-do"
new_sqlite_classes = ["SessionDO"]

# Optional per-IP throttle (Workers rate-limiting binding). The relay works
# without it; per-session limits are enforced inside the Durable Object.
# [[unsafe.bindings]]
# name = "IP_LIMITER"
# type = "ratelimit"
# namespace_id = "1001"
# simple = { limit = 100, period = 60 }

# For production, use custom domain instead of workers.dev
# routes = [
#   { pattern = "relay.covalent.dev", zone_name = "covalent-bond.dev" }
# ]
